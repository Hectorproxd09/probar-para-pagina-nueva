<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Creation</title>
    <style>
        /* Reset de estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Solo ocultar cursor en dispositivos que tengan mouse */
        @media (pointer: fine) {
            * { cursor: none; }
            #custom-cursor { display: block; }
        }

        body {
            /* Permitir scroll si el contenido es mayor al alto en móviles */
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            padding: 20px 0;
        }

        #custom-cursor {
            display: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.1s ease, background 0.2s ease;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
        }

        .ambient-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(220, 20, 60, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(139, 0, 0, 0.15) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
            animation: glowMove 15s ease infinite alternate;
        }

        @keyframes glowMove {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .video-background iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
            max-width: 420px;
            align-items: center;
            perspective: 1000px;
            animation: containerAppear 1s ease-out;
        }

        @keyframes containerAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .glass-panel {
            padding: 2.5rem 1.5rem;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease;
            transform-style: preserve-3d;
        }

        h1 {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 5px;
            margin-bottom: 2rem;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .button-list {
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }

        .btn {
            display: block;
            padding: 14px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.01);
            position: relative;
            z-index: 5;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: scale(1.03);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .dropdown {
            position: relative;
        }

        .dropdown-content {
            position: absolute;
            left: 105%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-left: 15px;
            pointer-events: none;
            visibility: hidden;
            z-index: 10;
        }

        /* Ajuste para móviles: Dropdown hacia abajo */
        @media (max-width: 768px) {
            body { overflow-y: auto; align-items: flex-start; }
            .dropdown-content {
                position: static;
                transform: none;
                visibility: visible;
                pointer-events: auto;
                max-height: 0;
                overflow: hidden;
                padding-left: 0;
                transition: max-height 0.3s ease, margin 0.3s ease;
            }
            .dropdown:hover .dropdown-content {
                max-height: 500px;
                margin-top: 10px;
            }
            .btn-sub { width: 100% !important; opacity: 1 !important; transform: none !important; animation: none !important; }
            h1 { font-size: 1.4rem; letter-spacing: 3px; }
        }

        .btn-sub {
            width: 170px;
            padding: 10px;
            font-size: 0.85rem;
            opacity: 0;
            transform: translateX(-10px);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dropdown:hover .dropdown-content {
            pointer-events: auto;
            visibility: visible;
        }

        @media (min-width: 769px) {
            .dropdown:hover .btn-sub {
                opacity: 1;
                transform: translateX(0);
                animation: floating 3.5s ease-in-out infinite;
            }
        }

        .dropdown:hover .btn-sub:nth-child(1) { transition-delay: 0.1s; }
        .dropdown:hover .btn-sub:nth-child(2) { transition-delay: 0.2s; }
        .dropdown:hover .btn-sub:nth-child(3) { transition-delay: 0.3s; }
        .dropdown:hover .btn-sub:nth-child(4) { transition-delay: 0.4s; }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        .instruction-panel {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .lang-container {
            display: flex; gap: 10px; margin-bottom: 1rem;
        }

        .btn-lang { flex: 1; padding: 7px; font-size: 0.75rem; text-transform: uppercase; }

        .instruction-content {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 14px;
            font-size: 0.85rem;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-line;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="ambient-glow"></div>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/KHrVwCrtZFY?autoplay=1&mute=1&loop=1&playlist=KHrVwCrtZFY&controls=0&showinfo=0&rel=0&modestbranding=1&start=0.3&end=13.7" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="overlay"></div>

    <div class="main-container">
        <div class="glass-panel">
            <h1>Page Creation</h1>
            <nav class="button-list">
                <div class="dropdown">
                    <a href="https://ai-delta-eosin.vercel.app/" target="_blank" class="btn">IA</a>
                    <div class="dropdown-content">
                        <a href="https://gemini.google.com/app?hl=es" target="_blank" class="btn btn-sub">Google Gemini</a>
                        <a href="https://hackerai.co/" target="_blank" class="btn btn-sub">HackerAI</a>
                        <a href="https://claude.ai/new" target="_blank" class="btn btn-sub">ClaudeAI</a>
                        <a href="https://chatgpt.com/" target="_blank" class="btn btn-sub">ChatGPT</a>
                    </div>
                </div>

                <div class="dropdown">
                    <a href="https://github.com/" target="_blank" class="btn">GitHub</a>
                    <div class="dropdown-content">
                        <a href="https://github.com/new" target="_blank" class="btn btn-sub">Nuevo Repositorio</a>
                    </div>
                </div>

                <a href="https://vercel.com/" target="_blank" class="btn">Vercel</a>
                <a href="https://www.youtube.com/" target="_blank" class="btn">YouTube</a>
            </nav>
        </div>

        <div class="instruction-panel">
            <div class="lang-container">
                <button class="btn btn-lang" onclick="setLang('es')">Español</button>
                <button class="btn btn-lang" onclick="setLang('en')">English</button>
            </div>
            <div id="text-target" class="instruction-content">
                <p style="opacity: 0.5; text-align: center; font-size: 0.8rem;">Select language for tutorial</p>
            </div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        
        // Solo ejecutar seguimiento de cursor si el dispositivo tiene puntero (PC)
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', e => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        }

        function updateCursorListeners() {
            const links = document.querySelectorAll('a, button');
            links.forEach(link => {
                link.addEventListener('mouseenter', () => {
                    cursor.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    cursor.style.background = 'rgba(255, 255, 255, 0.9)';
                });
                link.addEventListener('mouseleave', () => {
                    cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                    cursor.style.background = 'rgba(255, 255, 255, 0.6)';
                });
            });
        }
        updateCursorListeners();

        // Parallax - Solo en PC para no laguear el móvil
        const glassPanel = document.querySelector('.glass-panel');
        const instructPanel = document.querySelector('.instruction-panel');

        if (window.innerWidth > 768) {
            document.addEventListener('mousemove', e => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 70;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 70;
                glassPanel.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                instructPanel.style.transform = `rotateY(${xAxis * 1.1}deg) rotateX(${yAxis * 1.1}deg)`;
            });
        }

        const content = {
            es: `INSTRUCCIONES:\nComienza solicitando a una IA la creación de un archivo HTML utilizando un prompt.\nLuego, crea un repositorio en GitHub. Dentro, agrega un archivo llamado "index.html" y pega el código.\nGuarda los cambios, ve a Vercel, conecta tu GitHub y despliega el proyecto.`,
            en: `INSTRUCTIONS:\nStart by asking an AI to create an HTML file using a prompt.\nThen, create a GitHub repository, add "index.html" and paste the code.\nSave changes, go to Vercel, connect your GitHub and deploy.`
        };

        function setLang(lang) {
            document.getElementById('text-target').innerText = content[lang];
        }
    </script>
</body>
</html>
