<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Staatliches&display=swap" rel="stylesheet">
    <style>
        /* Reset y Fondo */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://wallpapers.com/images/hd/green-anime-mu262he5q0kh3067.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Staatliches', cursive;
            color: #000000;
        }

        /* Animación Fade-in Up */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Contenedor Principal (Panel) */
        .panel {
            background-color: #005C31;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeInUp 1.2s ease-out;
            max-width: 400px;
            width: 90%;
        }

        /* Header */
        h1 {
            font-family: 'Creepster', system-ui;
            font-size: 3.5rem;
            margin: 0 0 20px 0;
            color: #5AB307; /* Color resaltado para legibilidad */
            text-shadow: 3px 3px 0px #000000;
        }

        /* Texto general con sombra negra */
        p, a {
            text-shadow: 2px 2px 0px #000000;
        }

        /* Estilo de Botones */
        .btn {
            display: block;
            background-color: #5AB307;
            color: #000000;
            text-decoration: none;
            padding: 12px;
            margin: 15px 0;
            font-size: 24px;
            border-radius: 8px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        /* Efecto Hover (Verdoso más claro) */
        .btn:hover {
            background-color: #76e00b;
            transform: scale(1.05);
            box-shadow: 0 0 15px #5AB307;
        }

        /* Efecto Focus (Glow verde cálido) */
        .btn:focus {
            outline: none;
            border-color: #adff2f;
            box-shadow: 0 0 20px #adff2f;
        }

        /* Ajuste específico para el primer botón debajo del header */
        .btn-site {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="panel">
        <header>
            <h1>The best scams server</h1>
        </header>

        <a href="https://www.logged.tg/auth/hackeos" class="btn btn-site">Site</a>
        <a href="https://is-gd-su.vercel.app/" class="btn">Hyperlink</a>
        <a href="https://bypasser-pi-ten.vercel.app/" class="btn">Bypasser</a>
        <a href="https://discord.gg/J942CruNSJ" class="btn">Discord Server</a>
    </div>

</body>
</html>
