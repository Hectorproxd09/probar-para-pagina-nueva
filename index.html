<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Creation</title>
    <style>
        /* Reset de estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
        }

        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .video-background iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
            max-width: 400px;
            align-items: center;
        }

        .glass-panel {
            padding: 3rem;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
        }

        .button-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .btn {
            display: block;
            padding: 14px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            position: relative;
            z-index: 5;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.05);
            border-color: #fff;
        }

        /* --- SUB-BOTONES IA FLOTANTES --- */
        .dropdown {
            position: relative;
        }

        .dropdown-content {
            position: absolute;
            left: calc(100% + 20px);
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
            visibility: hidden;
        }

        .btn-sub {
            width: 160px;
            padding: 10px;
            font-size: 0.85rem;
            opacity: 0;
            transform: translateX(-20px);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.5s ease;
        }

        .dropdown:hover .dropdown-content {
            pointer-events: auto;
            visibility: visible;
        }

        .dropdown:hover .btn-sub {
            opacity: 1;
            transform: translateX(0);
            /* Animación de movimiento sutil */
            animation: floating 3s ease-in-out infinite;
        }

        /* Retrasos de aparición y desfase de animación */
        .dropdown:hover .btn-sub:nth-child(1) { transition-delay: 0.1s; animation-delay: 0s; }
        .dropdown:hover .btn-sub:nth-child(2) { transition-delay: 0.2s; animation-delay: 0.5s; }
        .dropdown:hover .btn-sub:nth-child(3) { transition-delay: 0.3s; animation-delay: 1s; }
        .dropdown:hover .btn-sub:nth-child(4) { transition-delay: 0.4s; animation-delay: 1.5s; }

        /* Keyframes para el movimiento sutil */
        @keyframes floating {
            0% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-5px) translateX(2px); }
            100% { transform: translateY(0px) translateX(0px); }
        }

        /* --- PANEL DE INSTRUCCIONES --- */
        .instruction-panel {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            color: #fff;
        }

        .lang-container {
            display: flex; gap: 10px; margin-bottom: 1rem;
        }

        .btn-lang { flex: 1; padding: 6px; font-size: 0.75rem; text-transform: uppercase; }

        .instruction-content {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.5;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-line;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/gxetb5bjA34?autoplay=1&mute=1&loop=1&playlist=gxetb5bjA34&controls=0&showinfo=0&rel=0&modestbranding=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="overlay"></div>

    <div class="main-container">
        <div class="glass-panel">
            <h1>Page Creation</h1>
            <nav class="button-list">
                <div class="dropdown">
                    <a href="https://ai-delta-eosin.vercel.app/" target="_blank" class="btn">IA</a>
                    <div class="dropdown-content">
                        <a href="https://gemini.google.com/app?hl=es" target="_blank" class="btn btn-sub">Google Gemini</a>
                        <a href="https://hackerai.co/" target="_blank" class="btn btn-sub">HackerAI</a>
                        <a href="https://claude.ai/new" target="_blank" class="btn btn-sub">ClaudeAI</a>
                        <a href="https://chatgpt.com/" target="_blank" class="btn btn-sub">ChatGPT</a>
                    </div>
                </div>
                <a href="https://github.com/" target="_blank" class="btn">GitHub</a>
                <a href="https://vercel.com/" target="_blank" class="btn">Vercel</a>
                <a href="https://www.youtube.com/" target="_blank" class="btn">YouTube</a>
            </nav>
        </div>

        <div class="instruction-panel">
            <div class="lang-container">
                <button class="btn btn-lang" onclick="setLang('es')">Español</button>
                <button class="btn btn-lang" onclick="setLang('en')">English</button>
            </div>
            <div id="text-target" class="instruction-content">
                <p style="opacity: 0.5; text-align: center; font-size: 0.8rem;">Select language for tutorial</p>
            </div>
        </div>
    </div>

    <script>
        const content = {
            es: `INSTRUCCIONES:
            Comienza solicitando a una IA la creación de un archivo HTML utilizando un prompt.
            Luego, crea un repositorio en GitHub. Dentro del repositorio, agrega un nuevo archivo llamado "index.html" y pega el código HTML generado.
            Guarda los cambios en el repositorio para asegurarte de no perder el archivo.
            Dirígete a Vercel y regístrate o inicia sesión utilizando tu cuenta de GitHub.
            Una vez dentro, selecciona la opción "Add New Project" y elige el repositorio que creaste.
            Finalmente, despliega el proyecto.`,
            en: `INSTRUCTIONS:
            Start by requesting an AI to create an HTML file using a prompt.
            Then, create a repository on GitHub. Inside the repository, add a new file called "index.html" and paste the generated HTML code.
            Save the changes to the repository to ensure you don't lose the file.
            Go to Vercel and register or log in using your GitHub account.
            Once logged in, select the "Add New Project" option and choose the repository you created.
            Finally, expand the project.`
        };

        function setLang(lang) {
            document.getElementById('text-target').innerText = content[lang];
        }
    </script>
</body>
</html>
