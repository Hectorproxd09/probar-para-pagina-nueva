<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Creator UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ff6b6b;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- FONDO DE VIDEO ORIGINAL --- */
        .bg-video {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            filter: brightness(0.4) contrast(1.2);
        }
        .bg-video iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 150%);
            z-index: -1;
        }

        /* --- BARRA DE BÚSQUEDA --- */
        .search-box {
            position: absolute; top: 40px;
            width: 100%; max-width: 400px;
            z-index: 100;
        }
        #main-search {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            color: white;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            text-align: center;
        }
        #main-search:focus {
            background: rgba(255,255,255,0.15);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.2);
        }

        /* --- PANEL PRINCIPAL 3D --- */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--shadow);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            position: relative;
        }

        h1 {
            font-size: 1.8rem; font-weight: 800;
            margin-bottom: 30px; text-align: center;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transform: translateZ(50px);
        }

        /* --- LISTA DE BOTONES Y DESPLIEGUE LATERAL --- */
        .nav-menu { list-style: none; transform: translateZ(30px); }

        .nav-item { position: relative; margin-bottom: 12px; }

        .btn-main {
            width: 100%;
            padding: 16px 25px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white;
            text-decoration: none;
            display: flex; justify-content: space-between;
            transition: 0.3s;
            font-weight: 500;
        }

        .btn-main:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
            transform: scale(1.02);
        }

        /* --- DESPLIEGUE A LA DERECHA (FLYOUT) --- */
        .side-menu {
            position: absolute;
            left: 105%; top: 0;
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 200px;
            z-index: 10;
        }

        .nav-item:hover .side-menu { display: flex; }

        .btn-sub {
            padding: 12px 18px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.85rem;
            animation: float 3s ease-in-out infinite; /* Animación flotante */
        }

        .btn-sub:hover {
            background: var(--accent);
            color: white;
            transform: translateX(5px);
        }

        /* Delays para la flotación */
        .btn-sub:nth-child(2) { animation-delay: 0.5s; }
        .btn-sub:nth-child(3) { animation-delay: 1s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* --- CURSOR --- */
        #cursor {
            position: fixed; width: 20px; height: 20px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transition: transform 0.1s;
            transform: translate(-50%, -50%);
        }

    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="bg-video">
        <iframe src="https://www.youtube.com/embed/KHrVwCrtZFY?autoplay=1&mute=1&loop=1&playlist=KHrVwCrtZFY&controls=0&showinfo=0&rel=0" frameborder="0"></iframe>
    </div>
    <div class="overlay"></div>

    <div class="search-box">
        <input type="text" id="main-search" placeholder="Buscar GitHub, ChatGPT, Gemini...">
    </div>

    <div class="glass-panel" id="tilt-panel">
        <h1>Page Creation</h1>
        
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="#" class="btn-main">IA Tools <span>→</span></a>
                <div class="side-menu">
                    <a href="https://chatgpt.com" target="_blank" class="btn-sub">ChatGPT</a>
                    <a href="https://gemini.google.com" target="_blank" class="btn-sub">Google Gemini</a>
                    <a href="https://claude.ai" target="_blank" class="btn-sub">Claude AI</a>
                </div>
            </li>

            <li class="nav-item">
                <a href="#" class="btn-main">GitHub <span>→</span></a>
                <div class="side-menu">
                    <a href="https://github.com" target="_blank" class="btn-sub">GitHub Home</a>
                    <a href="https://github.com/new" target="_blank" class="btn-sub">New Repo</a>
                </div>
            </li>

            <li class="nav-item">
                <a href="https://vercel.com" target="_blank" class="btn-main">Vercel Deploy <span>🚀</span></a>
            </li>
        </ul>
    </div>

    <script>
        const panel = document.getElementById('tilt-panel');
        const cursor = document.getElementById('cursor');
        const search = document.getElementById('main-search');

        // 1. Efecto 3D Tilt
        document.addEventListener('mousemove', (e) => {
            // Mover cursor
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            // Rotación panel
            const xAxis = (window.innerWidth / 2 - e.clientX) / 25;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 25;
            panel.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // 2. Lógica de Búsqueda Inteligente
        search.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = search.value.toLowerCase();
                if (val.includes('github')) window.open('https://github.com', '_blank');
                else if (val.includes('chatgpt') || val.includes('gpt')) window.open('https://chatgpt.com', '_blank');
                else if (val.includes('gemini')) window.open('https://gemini.google.com', '_blank');
                else if (val.includes('vercel')) window.open('https://vercel.com', '_blank');
                else window.open(`https://www.google.com/search?q=${val}`, '_blank');
                
                search.value = ''; // Limpiar
            }
        });

        // Efecto click cursor
        document.addEventListener('mousedown', () => cursor.style.transform = 'translate(-50%, -50%) scale(0.7)');
        document.addEventListener('mouseup', () => cursor.style.transform = 'translate(-50%, -50%) scale(1)');

    </script>
</body>
</html>
