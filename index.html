<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Creation</title>
    <style>
        /* Reset de estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            overflow: hidden; /* Evita el scroll */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        /* Contenedor del fondo animado */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        /* Ajuste para que el video de la web ocupe todo */
        .background-container iframe {
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* Para que no interfiera con los clics en los botones */
            transform: scale(1.1); /* Elimina posibles bordes blancos */
        }

        /* Capa oscura para mejorar legibilidad */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        /* Contenedor principal */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 300;
        }

        /* Estilo de los botones */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .btn {
            text-decoration: none;
            color: white;
            font-size: 1.1rem;
            padding: 12px 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            transition: all 0.3s ease;
            background: transparent;
        }

        .btn:hover {
            background: white;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

    </style>
</head>
<body>

    <div class="background-container">
        <iframe src="https://mylivewallpapers.com/anime/red-eye-blink-live-wallpaper/" frameborder="0"></iframe>
    </div>
    
    <div class="overlay"></div>

    <div class="content">
        <h1>Page Creation</h1>
        <div class="button-group">
            <a href="https://gemini.google.com/app?hl=es" target="_blank" class="btn">IA</a>
            <a href="https://vercel.com/" target="_blank" class="btn">Vercel</a>
            <a href="https://github.com/" target="_blank" class="btn">GitHub</a>
        </div>
    </div>

</body>
</html>
