<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Creation</title>
    <style>
        /* Reset de estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            cursor: none;
        }

        body {
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
        }

        #custom-cursor {
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.1s ease, background 0.2s ease;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
        }

        .ambient-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(220, 20, 60, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(139, 0, 0, 0.15) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
            animation: glowMove 15s ease infinite alternate;
        }

        @keyframes glowMove {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .video-background iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
            max-width: 420px;
            align-items: center;
            perspective: 1000px;
            animation: containerAppear 1s ease-out;
        }

        @keyframes containerAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .glass-panel {
            padding: 3rem;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease;
            transform-style: preserve-3d;
        }

        h1 {
            color: #fff;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 5px;
            margin-bottom: 3rem;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .button-list {
            display: flex;
            flex-direction: column;
            gap: 1.3rem;
        }

        .btn {
            display: block;
            padding: 16px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.01);
            position: relative;
            z-index: 5;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: scale(1.03) translateZ(20px);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .dropdown {
            position: relative;
        }

        .dropdown-content {
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-left: 15px;
            pointer-events: none;
            visibility: hidden;
            z-index: 10;
        }

        .btn-sub {
            width: 170px;
            padding: 11px;
            font-size: 0.88rem;
            opacity: 0;
            transform: translateX(-10px);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dropdown:hover .dropdown-content {
            pointer-events: auto;
            visibility: visible;
        }

        .dropdown:hover .btn-sub {
            opacity: 1;
            transform: translateX(0);
            animation: floating 3.5s ease-in-out infinite;
        }

        .dropdown:hover .btn-sub:nth-child(1) { transition-delay: 0.1s; animation-delay: 0s; }
        .dropdown:hover .btn-sub:nth-child(2) { transition-delay: 0.2s; animation-delay: 0.6s; }
        .dropdown:hover .btn-sub:nth-child(3) { transition-delay: 0.3s; animation-delay: 1.2s; }
        .dropdown:hover .btn-sub:nth-child(4) { transition-delay: 0.4s; animation-delay: 1.8s; }

        @keyframes floating {
            0% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-6px) translateX(3px); }
            100% { transform: translateY(0px) translateX(0px); }
        }

        .instruction-panel {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.8rem;
            color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease;
        }

        .lang-container {
            display: flex; gap: 12px; margin-bottom: 1.2rem;
        }

        .btn-lang { flex: 1; padding: 7px; font-size: 0.8rem; text-transform: uppercase; }

        .instruction-content {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.2rem;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.6;
            max-height: 160px;
            overflow-y: auto;
            white-space: pre-line;
            text-align: left;
        }

        .instruction-content::-webkit-scrollbar { width: 4px; }
        .instruction-content::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="ambient-glow"></div>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/KHrVwCrtZFY?autoplay=1&mute=1&loop=1&playlist=KHrVwCrtZFY&controls=0&showinfo=0&rel=0&modestbranding=1&start=0.3&end=13.7" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="overlay"></div>

    <div class="main-container">
        <div class="glass-panel">
            <h1>Page Creation</h1>
            <nav class="button-list">
                <div class="dropdown">
                    <a href="https://ai-delta-eosin.vercel.app/" target="_blank" class="btn">IA</a>
                    <div class="dropdown-content">
                        <a href="https://gemini.google.com/app?hl=es" target="_blank" class="btn btn-sub">Google Gemini</a>
                        <a href="https://hackerai.co/" target="_blank" class="btn btn-sub">HackerAI</a>
                        <a href="https://claude.ai/new" target="_blank" class="btn btn-sub">ClaudeAI</a>
                        <a href="https://chatgpt.com/" target="_blank" class="btn btn-sub">ChatGPT</a>
                    </div>
                </div>

                <div class="dropdown">
                    <a href="https://github.com/" target="_blank" class="btn">GitHub</a>
                    <div class="dropdown-content">
                        <a href="https://github.com/new" target="_blank" class="btn btn-sub">Nuevo Repositorio</a>
                    </div>
                </div>

                <a href="https://vercel.com/" target="_blank" class="btn">Vercel</a>
                <a href="https://www.youtube.com/" target="_blank" class="btn">YouTube</a>
            </nav>
        </div>

        <div class="instruction-panel">
            <div class="lang-container">
                <button class="btn btn-lang" onclick="setLang('es')">Español</button>
                <button class="btn btn-lang" onclick="setLang('en')">English</button>
            </div>
            <div id="text-target" class="instruction-content">
                <p style="opacity: 0.5; text-align: center; font-size: 0.8rem;">Select language for tutorial</p>
            </div>
        </div>
    </div>

    <script>
        // Cursor
        const cursor = document.getElementById('custom-cursor');

        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Actualizamos los listeners para los links dinámicos
        function updateCursorListeners() {
            const links = document.querySelectorAll('a, button');
            links.forEach(link => {
                link.addEventListener('mouseenter', () => {
                    cursor.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    cursor.style.background = 'rgba(255, 255, 255, 0.9)';
                });
                link.addEventListener('mouseleave', () => {
                    cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                    cursor.style.background = 'rgba(255, 255, 255, 0.6)';
                });
            });
        }
        updateCursorListeners();

        // Parallax - Efecto sutil
        const glassPanel = document.querySelector('.glass-panel');
        const instructPanel = document.querySelector('.instruction-panel');

        document.addEventListener('mousemove', e => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 70;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 70;

            glassPanel.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            instructPanel.style.transform = `rotateY(${xAxis * 1.1}deg) rotateX(${yAxis * 1.1}deg)`;
        });

        // Contenido
        const content = {
            es: `INSTRUCCIONES:
            Comienza solicitando a una IA la creación de un archivo HTML utilizando un prompt.
            Luego, crea un repositorio en GitHub. Dentro del repositorio, agrega un nuevo archivo llamado "index.html" y pega el código HTML generado.
            Guarda los cambios en el repositorio para asegurarte de no perder el archivo.
            Dirígete a Vercel y regístrate o inicia sesión utilizando tu cuenta de GitHub.
            Una vez dentro, selecciona la opción "Add New Project" y elige el repositorio que creaste.
            Finalmente, despliega el proyecto.`,
            en: `INSTRUCTIONS:
            Start by requesting an AI to create an HTML file using a prompt.
            Then, create a repository on GitHub. Inside the repository, add a new file called "index.html" and paste the generated HTML code.
            Save the changes to the repository to ensure you don't lose the file.
            Go to Vercel and register or log in using your GitHub account.
            Once logged in, select the "Add New Project" option and choose the repository you created.
            Finally, expand the project.`
        };

        function setLang(lang) {
            document.getElementById('text-target').innerText = content[lang];
        }
    </script>
</body>
</html>
