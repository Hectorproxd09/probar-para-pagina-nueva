<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Dashboard</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Mantén aquí tu CSS anterior o llévalo a style.css */
        /* ... (Tu CSS anterior con las mejoras de responsividad) ... */
    </style>
</head>
<body class="loading">

    <div id="custom-cursor"></div>
    <div class="ambient-glow" id="ambient-glow"></div>

    <div class="video-background">
        <iframe id="bg-video" src="https://www.youtube.com/embed/KHrVwCrtZFY?autoplay=1&mute=1&loop=1&playlist=KHrVwCrtZFY&controls=0&showinfo=0&rel=0&modestbranding=1" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="overlay"></div>

    <main class="main-container">
        <section class="glass-panel" id="main-card">
            <h1>Page Creation</h1>
            <nav class="button-list">
                <div class="dropdown">
                    <button class="btn dropdown-trigger">IA <span class="arrow">▾</span></button>
                    <div class="dropdown-content">
                        <a href="https://gemini.google.com/app" target="_blank" class="btn btn-sub">Google Gemini</a>
                        <a href="https://hackerai.co/" target="_blank" class="btn btn-sub">HackerAI</a>
                        <a href="https://claude.ai/new" target="_blank" class="btn btn-sub">ClaudeAI</a>
                        <a href="https://chatgpt.com/" target="_blank" class="btn btn-sub">ChatGPT</a>
                    </div>
                </div>

                <div class="dropdown">
                    <button class="btn dropdown-trigger">GitHub <span class="arrow">▾</span></button>
                    <div class="dropdown-content">
                        <a href="https://github.com/new" target="_blank" class="btn btn-sub">Nuevo Repositorio</a>
                    </div>
                </div>

                <a href="https://vercel.com/" target="_blank" class="btn">Vercel</a>
                <a href="https://www.youtube.com/" target="_blank" class="btn">YouTube</a>
            </nav>
        </section>

        <section class="instruction-panel">
            <div class="lang-container">
                <button class="btn btn-lang" data-lang="es">Español</button>
                <button class="btn btn-lang" data-lang="en">English</button>
            </div>
            <div id="text-target" class="instruction-content">
                <p class="placeholder-text">Selecciona un idioma para comenzar el tutorial</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
