<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Best Scams Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Staatliches&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #5AB307;
            --panel-bg: rgba(0, 92, 49, 0.85); /* Verde oscuro con transparencia */
            --hover-green: #76e00b;
            --shadow-color: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://wallpapers.com/images/hd/green-anime-mu262he5q0kh3067.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Staatliches', cursive;
            color: #000000;
            overflow: hidden;
        }

        /* Animación Slow Fade-in Up */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-panel {
            background-color: var(--panel-bg);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); /* Efecto moderno de desenfoque */
            animation: fadeInUp 1.2s ease-out;
        }

        h1 {
            font-family: 'Creepster', system-ui;
            font-size: 3.5rem;
            color: var(--primary-green);
            text-shadow: 3px 3px var(--shadow-color);
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background-color: var(--primary-green);
            color: #000000;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 24px;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            display: inline-block;
        }

        /* Efectos de Hover */
        .btn:hover {
            background-color: var(--hover-green);
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary-green);
            color: #ffffff;
        }

        /* Efecto Focus (Glow verde cálido) */
        .btn:focus {
            outline: none;
            box-shadow: 0 0 25px #adff2f;
        }

        /* Subtítulo o texto extra con sombra */
        p {
            text-shadow: 1px 1px 2px var(--shadow-color);
            margin-bottom: 20px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* Estilo responsivo simple */
        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .btn { font-size: 20px; }
        }
    </style>
</head>
<body>

            <a href="https://discord.gg/J942CruNSJ" target="_blank" class="btn">Discord Server</a>
        </div>
    </div>

</body>
</html>
